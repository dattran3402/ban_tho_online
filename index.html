<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Bàn thờ online</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      body {
        margin: 0;
        background: radial-gradient(circle, #2a1a1a, #0d0606);
        color: #fff;
        font-family: system-ui;
        text-align: center;
      }

      h1 {
        color: gold;
        margin-top: 20px;
      }

      .frame {
        display: inline-block;
        padding: 10px;
        border: 5px solid gold;
        background: #000;
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      }

      .avatar {
        width: 180px;
        height: 240px;
        object-fit: cover;
      }

      .name {
        margin-top: 10px;
        font-size: 20px;
      }

      .incense-area {
        margin-top: 30px;
        height: 140px;
      }

      /* 🔥 Nhang */
      .stick {
        width: 6px;
        height: 80px;
        background: linear-gradient(#5b2c2c, #2b1111);
        margin: 0 4px;
        display: inline-block;
        position: relative;
        transform-origin: bottom;
      }

      /* cháy từ ngọn xuống, chân nhang giữ nguyên - duration set bằng JS */
      .burning {
        transform-origin: bottom;
        animation: burn var(--burn-duration, 60s) linear forwards;
      }

      @keyframes burn {
        from {
          transform: scaleY(1);
        }
        to {
          transform: scaleY(0);
        }
      }

      /* đầu nhang */
      .stick::after {
        content: "";
        position: absolute;
        top: -4px;
        left: 50%;
        width: 6px;
        height: 6px;
        background: red;
        border-radius: 50%;
        transform: translateX(-50%);
      }

      /* khói */
      .smoke {
        position: absolute;
        top: -10px;
        left: 50%;
        width: 8px;
        height: 8px;
        background: rgba(200, 200, 200, 0.6);
        border-radius: 50%;
        transform: translateX(-50%);
        animation: smoke 3s infinite ease-out;
      }

      @keyframes smoke {
        0% {
          transform: translate(-50%, 0) scale(1);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -80px) scale(2.5);
          opacity: 0;
        }
      }

      input {
        margin: 5px;
        padding: 8px;
        border-radius: 4px;
        border: none;
      }

      .count {
        margin-top: 10px;
        opacity: 0.7;
      }

      button {
        margin: 5px 5px;
        padding: 10px 18px;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
      }

      .button-area {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 8px;
        margin-bottom: 100px;
      }

      .button-area button {
        width: 200px;
      }

      .light-button {
        background: gold;
      }

      .remove-button {
        background: rgb(75, 75, 75);
      }

      /* Form cập nhật */
      .update-section {
        max-width: 320px;
        margin: 100px auto;
        padding: 24px;
        background: rgba(0, 0, 0, 0.5);
        border: 2px solid rgba(255, 215, 0, 0.4);
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      }

      .update-section h2 {
        margin: 0 0 20px 0;
        font-size: 1rem;
        font-weight: 600;
        color: rgba(255, 215, 0, 0.9);
        letter-spacing: 0.5px;
      }

      .update-section .field {
        margin-bottom: 16px;
        text-align: left;
      }

      .update-section .field label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.8);
      }

      .update-section input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        margin: 0;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 215, 0, 0.3);
        border-radius: 8px;
        color: #fff;
        font-size: 1rem;
      }

      .update-section input[type="text"]::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }

      .update-section input[type="text"]:focus {
        outline: none;
        border-color: gold;
        box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.2);
      }

      .update-section input[type="number"] {
        width: 100%;
        box-sizing: border-box;
        margin: 0;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 215, 0, 0.3);
        border-radius: 8px;
        color: #fff;
        font-size: 1rem;
      }

      .update-section input[type="number"]:focus {
        outline: none;
        border-color: gold;
        box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.2);
      }

      .update-section .file-wrap {
        position: relative;
      }

      .update-section input[type="file"] {
        position: absolute;
        opacity: 0;
        width: 100%;
        height: 100%;
        cursor: pointer;
        margin: 0;
        padding: 0;
      }

      .update-section .file-label {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px dashed rgba(255, 215, 0, 0.4);
        border-radius: 8px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.9rem;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
      }

      .update-section .file-wrap:hover .file-label,
      .update-section input[type="file"]:focus + .file-label {
        border-color: gold;
        background: rgba(255, 215, 0, 0.08);
      }

      .update-section .submit-btn {
        width: 100%;
        margin-top: 8px;
        padding: 12px;
        background: linear-gradient(180deg, #e6c200, #b8860b);
        border: none;
        border-radius: 8px;
        color: #1a0a00;
        font-weight: bold;
        font-size: 1rem;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(255, 215, 0, 0.3);
        transition: transform 0.15s, box-shadow 0.15s;
      }

      .update-section .submit-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(255, 215, 0, 0.4);
      }

      .update-section .submit-btn:active {
        transform: translateY(0);
      }

      .update-section .reset-btn {
        width: 100%;
        margin-top: 10px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        color: rgba(255, 255, 255, 0.8);
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
      }

      .update-section .reset-btn:hover {
        background: rgba(255, 255, 255, 0.15);
        border-color: rgba(255, 255, 255, 0.3);
      }

      .copyright {
        margin-top: 40px;
        padding: 16px;
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.5);
      }

      .copyright a {
        color: rgba(255, 215, 0, 0.7);
        text-decoration: none;
      }

      .copyright a:hover {
        color: gold;
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h1>🕯️</h1>
      <h1>Bàn thờ online</h1>
    </div>

    <div class="frame">
      <img id="avatar" class="avatar" />
    </div>

    <div id="name" class="name"></div>

    <div id="incense" class="incense-area"></div>

    <div class="button-area">
      <button class="light-button" onclick="light()">Thắp nhang</button>
      <button class="remove-button" onclick="removeIncense()">Giảm</button>
    </div>

    <div id="count" class="count"></div>

    <hr style="margin: 30px 0; opacity: 0.2" />

    <section class="update-section">
      <h2>✏️ Cập nhật thông tin</h2>
      <div class="field">
        <label for="nameInput">Tên người được thờ</label>
        <input id="nameInput" type="text" placeholder="Nhập tên..." value="" />
      </div>
      <div class="field">
        <label>Ảnh chân dung</label>
        <div class="file-wrap">
          <input type="file" id="fileInput" accept="image/*" />
          <span class="file-label">📷 Chọn ảnh hoặc kéo thả vào đây</span>
        </div>
      </div>
      <div class="field">
        <label for="burnTimeInput">Thời gian cháy nhang (giây)</label>
        <input type="number" id="burnTimeInput" min="1" max="3600" value="60" />
      </div>
      <button class="submit-btn" onclick="updateName()">Cập nhật</button>
      <button class="reset-btn" onclick="resetInfo()">Đặt lại thông tin</button>
    </section>

    <footer class="copyright">
      © dattran3402 · <a href="https://github.com/dattran3402/ban_tho_online" target="_blank" rel="noopener">github.com/dattran3402/ban_tho_online</a>
    </footer>

    <script>
      let data = JSON.parse(localStorage.getItem("altar")) || {
        name: "Các cụ",
        img: "",
        burnSeconds: 60,
      };

      const incenseContainer = document.getElementById("incense");

      /* ================= RENDER ================= */

      function render() {
        document.getElementById("name").innerText = data.name;
        document.getElementById("avatar").src =
          data.img || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
        var nameInput = document.getElementById("nameInput");
        if (nameInput) nameInput.value = data.name || "";
        var burnInput = document.getElementById("burnTimeInput");
        if (burnInput) burnInput.value = data.burnSeconds ?? (data.burnMinutes != null ? data.burnMinutes * 60 : 60);
      }

      function renderCount() {
        document.getElementById("count").innerText =
          "Đang cháy: " + incenseContainer.children.length + " nén";
      }

      /* ================= NHANG ================= */

      function getBurnSeconds() {
        var input = document.getElementById("burnTimeInput");
        return input ? Math.max(1, Math.min(3600, parseInt(input.value, 10) || 60)) : 60;
      }

      function createStick() {
        const seconds = getBurnSeconds();
        const stick = document.createElement("div");
        stick.className = "stick burning";
        stick.style.setProperty("--burn-duration", seconds + "s");

        const smoke = document.createElement("div");
        smoke.className = "smoke";

        stick.appendChild(smoke);
        incenseContainer.appendChild(stick);

        renderCount();

        setTimeout(() => {
          stick.remove();
          renderCount();
        }, seconds * 1000);
      }

      function light() {
        createStick();
      }

      function removeIncense() {
        const sticks = incenseContainer.children;
        if (sticks.length > 0) {
          sticks[sticks.length - 1].remove();
          renderCount();
        }
      }

      /* ================= UPDATE ================= */

      function updateName() {
        const name = document.getElementById("nameInput").value;
        if (name) {
          data.name = name;
          save();
          render();
        }
      }

      function resetInfo() {
        data = { name: "Các cụ", img: "" };
        save();
        document.getElementById("fileInput").value = "";
        render();
      }

      function save() {
        localStorage.setItem("altar", JSON.stringify(data));
      }

      /* ================= THỜI GIAN CHÁY ================= */

      document.getElementById("burnTimeInput").addEventListener("change", function () {
        var sec = Math.max(1, Math.min(3600, parseInt(this.value, 10) || 60));
        this.value = sec;
        data.burnSeconds = sec;
        save();
      });

      /* ================= UPLOAD ================= */

      document.getElementById("fileInput").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();

        reader.onload = () => {
          const img = new Image();
          img.src = reader.result;

          img.onload = () => {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            const MAX = 300;
            const scale = MAX / img.width;

            canvas.width = MAX;
            canvas.height = img.height * scale;

            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            data.img = canvas.toDataURL("image/jpeg", 0.7);

            save();
            render();
          };
        };

        reader.readAsDataURL(file);
      });

      render();
    </script>
  </body>
</html>
